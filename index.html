<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promowise TAL Toolkit | Campaign Ops</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --pw-primary:#1E1E54; --pw-primary-light:#eff6ff; --pw-pink:#db2777; --pw-green:#059669; --bg-slate:#f3f4f6; }
    body { font-family:'Inter',sans-serif; background:var(--bg-slate); color:#1f2937; margin:0; overflow:hidden; }
    ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
    .fade-in{animation:fadeIn .35s ease-out forwards} @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .tier-1{background:#dcfce7;color:#166534;border-color:#86efac}
    .tier-2{background:#fef9c3;color:#854d0e;border-color:#fde047}
    .tier-3{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
    .drop-zone{border:2px dashed #cbd5e1;transition:all .2s}
    .drop-zone.drag-over{border-color:#3b82f6;background:#eff6ff}
    .pulse-dot{animation:pd 1.5s infinite} @keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
    .sidebar-lbl{padding:14px 20px 4px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em}
    .progress-bar{transition:width .3s ease}
    .xl-badge{background:#217346;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.03em}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ─── ICON ─── */
const Icon = ({ name, size=18, className="" }) => {
  const ref = useRef(null);
  useEffect(() => { if(ref.current) lucide.createIcons({nodes:[ref.current]}); }, [name]);
  return <i ref={ref} data-lucide={name} className={className} style={{width:size,height:size,display:'inline-block',flexShrink:0}} />;
};

/* ─── TOAST ─── */
const toast = (msg, type='success') => {
  const c={success:'#059669',error:'#DC2626',info:'#2563EB',warn:'#D97706'};
  const el=document.createElement('div');
  el.textContent=msg;
  Object.assign(el.style,{position:'fixed',bottom:'28px',left:'50%',transform:'translateX(-50%)',
    background:c[type]||c.info,color:'#fff',padding:'11px 26px',borderRadius:'12px',
    boxShadow:'0 8px 32px rgba(0,0,0,.18)',zIndex:'9999',fontSize:'13px',fontWeight:'700',whiteSpace:'nowrap'});
  document.body.appendChild(el);
  setTimeout(()=>{ if(document.body.contains(el)) document.body.removeChild(el); },3200);
};

/* ─── EXCEL EXPORT (xlsx) ─── */
const exportToExcel = (data, filename, sheetName='Results') => {
  if(!data||!data.length){ toast('No data to export','error'); return; }
  try {
    const ws = XLSX.utils.json_to_sheet(data);
    // Auto-width columns
    const cols = Object.keys(data[0]);
    ws['!cols'] = cols.map(k => ({ wch: Math.min(50, Math.max(12, k.length, ...data.slice(0,50).map(r => String(r[k]||'').length))) }));
    // Style header row green (xlsx-compatible)
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let C=range.s.c; C<=range.e.c; C++){
      const addr = XLSX.utils.encode_cell({r:0,c:C});
      if(!ws[addr]) continue;
      ws[addr].s = { font:{bold:true,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'1E1E54'}}, alignment:{horizontal:'center'} };
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, filename.endsWith('.xlsx') ? filename : filename+'.xlsx');
    toast(`✓ Downloading ${filename}`);
  } catch(e) {
    toast('Export failed: '+e.message,'error');
  }
};

/* ─── COLUMN DETECTION ─── */
const COL_ALIASES = {
  company:  ['company','company name','account','account name','organization','org','company_name','account_name','name'],
  industry: ['industry','sector','vertical','industry_type','sub_industry','primary_industry','industry name'],
  employees:['employees','employee count','company size','headcount','number of employees','employee_count','num_employees','size','# employees','employees range'],
  revenue:  ['revenue','annual revenue','estimated revenue','annual_revenue','revenue_range','company_revenue','revenue range'],
  country:  ['country','region','geo','geography','location','hq country','headquarters','hq_country','country/region'],
  website:  ['website','domain','url','company url','website_url','company_url','web site','homepage'],
  title:    ['title','job title','job_title','contact title','role','position'],
  city:     ['city','hq city','hq_city','headquarters city'],
  state:    ['state','hq state','hq_state','province'],
  email:    ['email','email address','work email','business email'],
  phone:    ['phone','phone number','mobile','direct phone'],
};
const detectCol = (headers, type) => {
  const al = COL_ALIASES[type]||[];
  const lo = headers.map(h=>String(h).toLowerCase().trim());
  for(const a of al){ const i=lo.indexOf(a); if(i>=0) return headers[i]; }
  for(const a of al){ const i=lo.findIndex(h=>h.includes(a)); if(i>=0) return headers[i]; }
  return null;
};

/* ─── PARSERS ─── */
const parseEmp = v => {
  if(v==null) return 0;
  const s=String(v).replace(/,/g,'').trim();
  if(s.includes('-')){ const p=s.split('-').map(x=>parseInt(x.replace(/\D/g,''))||0); return Math.round((p[0]+p[1])/2); }
  if(s.includes('+')) return parseInt(s)||0;
  const k=s.match(/^(\d+\.?\d*)k$/i); if(k) return Math.round(parseFloat(k[1])*1000);
  return parseInt(s)||0;
};
const parseRev = v => {
  if(v==null) return 0;
  const s=String(v).toLowerCase().replace(/[$,\s]/g,'').trim();
  const b=s.match(/^(\d+\.?\d*)b/); if(b) return parseFloat(b[1])*1e9;
  const m=s.match(/^(\d+\.?\d*)m/); if(m) return parseFloat(m[1])*1e6;
  const k=s.match(/^(\d+\.?\d*)k/); if(k) return parseFloat(k[1])*1e3;
  return parseFloat(s)||0;
};

/* ─── SCORING ENGINE ─── */
const scoreAccount = (row, cfg, cm) => {
  let score=0, max=0;
  const reasons=[];

  // Industry — weight 30
  if(cfg.industries.length>0 && cm.industry){
    max+=30;
    const ri=String(row[cm.industry]||'').toLowerCase();
    const ex=cfg.industries.find(i=>ri.includes(i.toLowerCase()));
    if(ex){ score+=30; reasons.push(`Industry: ${ex}`); }
    else {
      const pt=cfg.industries.find(i=>i.toLowerCase().split(/\s+/).some(w=>w.length>3&&ri.includes(w)));
      if(pt){ score+=15; reasons.push(`Partial industry: ${pt}`); }
    }
  }

  // Employee size — weight 25
  if((cfg.minEmp>0||cfg.maxEmp>0) && cm.employees){
    max+=25;
    const emp=parseEmp(row[cm.employees]);
    if(emp>0){
      const mn=cfg.minEmp||0, mx=cfg.maxEmp||Infinity;
      if(emp>=mn && emp<=mx){ score+=25; reasons.push('Size: in range'); }
      else if(emp>=mn*.6 && emp<=mx*1.4){ score+=12; reasons.push('Size: near range'); }
    }
  }

  // Geo — weight 20
  if(cfg.geos.length>0 && cm.country){
    max+=20;
    const rg=String(row[cm.country]||'').toLowerCase();
    const mg=cfg.geos.find(g=>rg.includes(g.toLowerCase())||g.toLowerCase().includes(rg));
    if(mg){ score+=20; reasons.push(`Geo: ${mg}`); }
  }

  // Revenue — weight 15
  if(cm.revenue){
    max+=15;
    const rv=parseRev(row[cm.revenue]);
    if(rv>=50e6){ score+=15; reasons.push('Revenue: large'); }
    else if(rv>=10e6){ score+=10; reasons.push('Revenue: mid-market'); }
    else if(rv>=1e6){ score+=5; reasons.push('Revenue: SMB'); }
  }

  // Title / job function — weight 10
  if(cfg.jobFunctions.length>0 && cm.title){
    max+=10;
    const rt=String(row[cm.title]||'').toLowerCase();
    const mt=cfg.jobFunctions.find(jf=>rt.includes(jf.toLowerCase()));
    if(mt){ score+=10; reasons.push(`Title: ${mt}`); }
  }

  const pct = max>0 ? Math.round((score/max)*100) : 50;
  return { score:pct, reasons };
};

const assignTier = s => s>=70?'Tier 1':s>=40?'Tier 2':'Tier 3';
const TIER_LBL = {'Tier 1':'High Priority','Tier 2':'Medium Priority','Tier 3':'Low Priority'};
const TIER_CLR = {'Tier 1':'#166534','Tier 2':'#854d0e','Tier 3':'#991b1b'};
const TIER_BG  = {'Tier 1':'#dcfce7','Tier 2':'#fef9c3','Tier 3':'#fee2e2'};
const tierLabel = t => TIER_LBL[t]||t;

/* Build clean export row — NO numeric score */
const buildRow = row => {
  const out={};
  Object.keys(row).forEach(k=>{
    if(k==='_score') return;
    if(k==='_tier'){ out['Tier']=row[k]; out['Priority Level']=tierLabel(row[k]); return; }
    if(k==='_reasons'){ out['Fit Reasoning']=row[k]; return; }
    out[k]=row[k];
  });
  return out;
};

/* ─── SHARED UI ─── */
const TierBadge = ({tier}) => {
  const cls=tier==='Tier 1'?'tier-1':tier==='Tier 2'?'tier-2':'tier-3';
  return <span className={`${cls} inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-full border whitespace-nowrap`}>{tier} — {tierLabel(tier)}</span>;
};

const FileDrop = ({onLoad, file, onClear, label='Drop TAL file here'}) => {
  const [over,setOver]=useState(false);
  const ref=useRef(null);
  const process=f=>{
    if(!f) return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!data.length){ toast('File is empty or unreadable','error'); return; }
        onLoad({name:f.name,data,headers:Object.keys(data[0]),rowCount:data.length});
      } catch{ toast('Failed to parse — ensure .xlsx, .xls or .csv','error'); }
    };
    r.readAsArrayBuffer(f);
  };
  if(file) return (
    <div className="bg-green-50 border border-green-200 rounded-xl p-3.5 flex items-center justify-between">
      <div className="flex items-center gap-3">
        <div className="w-9 h-9 bg-green-100 rounded-lg flex items-center justify-center shrink-0"><Icon name="file-check" size={17} className="text-green-600"/></div>
        <div><p className="text-sm font-bold text-green-800 truncate max-w-[220px]">{file.name}</p><p className="text-xs text-green-600">{file.rowCount.toLocaleString()} accounts · {file.headers.length} columns</p></div>
      </div>
      <button onClick={onClear} className="text-green-400 hover:text-red-500 p-1 rounded hover:bg-red-50 transition"><Icon name="x" size={15}/></button>
    </div>
  );
  return (
    <div className={`drop-zone rounded-xl p-7 text-center cursor-pointer ${over?'drag-over':''}`}
      onDragOver={e=>{e.preventDefault();setOver(true)}} onDragLeave={()=>setOver(false)}
      onDrop={e=>{e.preventDefault();setOver(false);process(e.dataTransfer.files[0])}}
      onClick={()=>ref.current?.click()}>
      <input ref={ref} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={e=>process(e.target.files[0])}/>
      <div className="w-11 h-11 bg-gray-100 rounded-xl flex items-center justify-center mx-auto mb-2.5"><Icon name="upload" size={20} className="text-gray-400"/></div>
      <p className="text-sm font-bold text-gray-700">{label}</p>
      <p className="text-xs text-gray-400 mt-1">Excel (.xlsx / .xls) or CSV</p>
    </div>
  );
};

const ICPForm = ({cfg,set}) => (
  <div className="space-y-3.5">
    {[
      {label:'Target Industries',key:'industries',type:'textarea',ph:'Financial Services\nHealthcare\nTechnology',note:'one per line'},
      {label:'Job Functions / Titles',key:'jobFunctions',type:'textarea',ph:'VP of Finance\nDirector of IT\nCISO',note:'one per line'},
    ].map(({label,key,type,ph,note})=>(
      <div key={key}>
        <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">{label} <span className="text-gray-400 font-normal normal-case">({note})</span></label>
        <textarea value={cfg[key].join('\n')} onChange={e=>set({...cfg,[key]:e.target.value.split('\n').filter(x=>x.trim())})}
          placeholder={ph} className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none h-20"/>
      </div>
    ))}
    <div className="grid grid-cols-2 gap-3">
      <div><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Min Employees</label>
        <input type="number" value={cfg.minEmp||''} onChange={e=>set({...cfg,minEmp:parseInt(e.target.value)||0})} placeholder="e.g. 100" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/></div>
      <div><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Max Employees</label>
        <input type="number" value={cfg.maxEmp||''} onChange={e=>set({...cfg,maxEmp:parseInt(e.target.value)||0})} placeholder="e.g. 5000" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/></div>
    </div>
    <div><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Target Geographies <span className="text-gray-400 font-normal normal-case">(comma-separated)</span></label>
      <input type="text" value={cfg.geos.join(', ')} onChange={e=>set({...cfg,geos:e.target.value.split(',').map(x=>x.trim()).filter(Boolean)})} placeholder="United States, United Kingdom, Canada" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/></div>
    <div><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Exclusions <span className="text-gray-400 font-normal normal-case">(comma-separated company names)</span></label>
      <input type="text" value={cfg.exclusions.join(', ')} onChange={e=>set({...cfg,exclusions:e.target.value.split(',').map(x=>x.trim()).filter(Boolean)})} placeholder="Competitor A, Competitor B" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/></div>
    <div><label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Target Account Count <span className="text-gray-400 font-normal normal-case">(0 = no limit)</span></label>
      <input type="number" value={cfg.targetCount||''} onChange={e=>set({...cfg,targetCount:parseInt(e.target.value)||0})} placeholder="e.g. 300" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/></div>
  </div>
);

const SummaryCards = ({results}) => {
  const t1=results.filter(r=>r._tier==='Tier 1').length;
  const t2=results.filter(r=>r._tier==='Tier 2').length;
  const t3=results.filter(r=>r._tier==='Tier 3').length;
  return (
    <div className="grid grid-cols-4 gap-3 mb-5 fade-in">
      {[['Total',results.length,'gray-900','white','border-gray-200'],
        ['Tier 1 — High',t1,'green-700','green-50','border-green-200'],
        ['Tier 2 — Medium',t2,'yellow-700','yellow-50','border-yellow-200'],
        ['Tier 3 — Low',t3,'red-700','red-50','border-red-200']
      ].map(([lbl,val,tc,bg,bc])=>(
        <div key={lbl} className={`bg-${bg} rounded-xl p-4 border ${bc} text-center`}>
          <p className={`text-2xl font-black text-${tc}`}>{val.toLocaleString()}</p>
          <p className={`text-xs text-${tc} font-semibold mt-1 opacity-80`}>{lbl}</p>
        </div>
      ))}
    </div>
  );
};

const ResultsTable = ({results, cols}) => {
  const [page,setPage]=useState(0);
  const PER=25, total=Math.ceil(results.length/PER);
  useEffect(()=>setPage(0),[results]);
  const rows=results.slice(page*PER,(page+1)*PER);
  return (
    <div className="bg-white rounded-xl border border-gray-200 overflow-hidden fade-in">
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead><tr className="bg-gray-50 border-b border-gray-200">
            <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Tier</th>
            {cols.map(c=><th key={c} className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider whitespace-nowrap">{c}</th>)}
            <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Fit Reasoning</th>
          </tr></thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={i} className="border-b border-gray-100 hover:bg-gray-50">
                <td className="px-4 py-3 whitespace-nowrap"><TierBadge tier={r._tier}/></td>
                {cols.map(c=><td key={c} className="px-4 py-3 text-gray-700 max-w-[180px] truncate" title={String(r[c]||'')}>{r[c]}</td>)}
                <td className="px-4 py-3 text-gray-500 text-xs max-w-[200px]">{r._reasons||'—'}</td>
              </tr>
            ))}
            {!rows.length && <tr><td colSpan={cols.length+2} className="px-4 py-10 text-center text-gray-400 text-sm">No accounts match this filter</td></tr>}
          </tbody>
        </table>
      </div>
      {total>1 && (
        <div className="flex items-center justify-between px-4 py-3 bg-gray-50 border-t border-gray-200">
          <p className="text-xs text-gray-500">Showing {page*PER+1}–{Math.min((page+1)*PER,results.length)} of {results.length.toLocaleString()}</p>
          <div className="flex gap-2">
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} className="px-3 py-1.5 text-xs font-bold rounded-lg bg-white border border-gray-200 disabled:opacity-30 hover:bg-gray-100">← Prev</button>
            <button disabled={page>=total-1} onClick={()=>setPage(p=>p+1)} className="px-3 py-1.5 text-xs font-bold rounded-lg bg-white border border-gray-200 disabled:opacity-30 hover:bg-gray-100">Next →</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* Excel Export Bar */
const ExportBar = ({results, prefix}) => {
  if(!results?.length) return null;
  const date=new Date().toISOString().slice(0,10);
  const go=(filter)=>{
    const data = filter==='all' ? results : results.filter(r=>r._tier===filter);
    if(!data.length){ toast(`No ${filter} accounts to export`,'warn'); return; }
    const suffix=filter==='all'?'All-Tiers':filter.replace(' ','');
    exportToExcel(data.map(buildRow), `${prefix}_${suffix}_${date}.xlsx`);
  };
  const t1=results.filter(r=>r._tier==='Tier 1').length;
  const t2=results.filter(r=>r._tier==='Tier 2').length;
  return (
    <div className="mt-4 bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center"><Icon name="file-spreadsheet" size={16} className="text-green-700"/></div>
          <div><p className="text-sm font-bold text-gray-800">Download Excel</p><p className="text-xs text-gray-500">Opens directly in Excel · all tiers pre-coloured</p></div>
        </div>
        <div className="flex flex-wrap gap-2">
          <button onClick={()=>go('all')} className="px-4 py-2 text-xs font-bold bg-gray-900 text-white rounded-lg hover:bg-gray-800 flex items-center gap-1.5"><Icon name="download" size={12}/> All Tiers ({results.length.toLocaleString()})</button>
          <button onClick={()=>go('Tier 1')} className="px-4 py-2 text-xs font-bold bg-green-700 text-white rounded-lg hover:bg-green-800 flex items-center gap-1.5"><Icon name="download" size={12}/> Tier 1 ({t1.toLocaleString()})</button>
          <button onClick={()=>go('Tier 2')} className="px-4 py-2 text-xs font-bold bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 flex items-center gap-1.5"><Icon name="download" size={12}/> Tier 2 ({t2.toLocaleString()})</button>
        </div>
      </div>
    </div>
  );
};

  <h3 className="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
    <span className={`w-6 h-6 bg-${color}-600 text-white rounded-full flex items-center justify-center text-xs font-black shrink-0`}>{n}</span>
    {label}
  </h3>
);

/* ════════════════════════════════════
   NARROW TAL VIEW
════════════════════════════════════ */
const NarrowView = () => {
  const [file,setFile]=useState(null);
  const [cfg,setCfg]=useState({industries:[],minEmp:0,maxEmp:0,geos:[],jobFunctions:[],exclusions:[],targetCount:0});
  const [results,setResults]=useState(null);
  const [filter,setFilter]=useState('all');
  const [cm,setCm]=useState({});
  const [busy,setBusy]=useState(false);
  const [progress,setProgress]=useState(0);

  useEffect(()=>{
    if(file){ const m={}; Object.keys(COL_ALIASES).forEach(t=>{const d=detectCol(file.headers,t);if(d)m[t]=d;}); setCm(m); }
  },[file]);

  const run = () => {
    if(!file){ toast('Upload a TAL file first','error'); return; }
    setBusy(true); setProgress(0); setResults(null);

    // Process in chunks to keep UI responsive and show progress
    const CHUNK=200;
    let scored=[];
    let idx=0;

    const processChunk = () => {
      const end=Math.min(idx+CHUNK,file.data.length);
      for(let i=idx;i<end;i++){
        const row=file.data[i];
        const cn=cm.company?String(row[cm.company]||'').toLowerCase():'';
        if(cfg.exclusions.some(ex=>ex&&cn.includes(ex.toLowerCase()))) continue;
        const {score,reasons}=scoreAccount(row,cfg,cm);
        scored.push({...row,_score:score,_tier:assignTier(score),_reasons:reasons.join(' | ')||'Baseline fit'});
      }
      idx=end;
      setProgress(Math.round((idx/file.data.length)*100));

      if(idx<file.data.length){
        setTimeout(processChunk,0);
      } else {
        scored.sort((a,b)=>b._score-a._score);
        if(cfg.targetCount>0&&scored.length>cfg.targetCount) scored=scored.slice(0,cfg.targetCount);
        setResults(scored); setFilter('all'); setBusy(false); setProgress(100);
        const t1=scored.filter(r=>r._tier==='Tier 1').length;
        const t2=scored.filter(r=>r._tier==='Tier 2').length;
        const t3=scored.filter(r=>r._tier==='Tier 3').length;
        toast(`Done: ${scored.length.toLocaleString()} accounts — ${t1} Tier 1 · ${t2} Tier 2 · ${t3} Tier 3`);
      }
    };
    setTimeout(processChunk,0);
  };

  const cols=useMemo(()=>!file?[]:['company','industry','employees','country','revenue','title'].map(t=>cm[t]).filter(Boolean).slice(0,5),[file,cm]);
  const filtered=useMemo(()=>!results?[]:filter==='all'?results:results.filter(r=>r._tier===filter),[results,filter]);

  return (
    <div className="max-w-5xl mx-auto pb-20 fade-in">
      <div className="mb-5">
        <h2 className="text-2xl font-black text-gray-900">Narrow TAL Analysis</h2>
        <p className="text-sm text-gray-500 mt-1">Score and tier your full TAL against ICP parameters. Output as Excel with tier colouring.</p>
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 shadow-sm">
        <StepHead n="1" label="Upload TAL File"/>
        <FileDrop onLoad={setFile} file={file} onClear={()=>{setFile(null);setResults(null);setCm({});}}/>
        {file&&Object.keys(cm).length>0&&(
          <div className="mt-3 flex flex-wrap gap-1.5 items-center">
            <span className="text-xs text-gray-400 font-semibold">Auto-detected:</span>
            {Object.entries(cm).map(([t,c])=><span key={t} className="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full font-semibold">{t}: <em>{c}</em></span>)}
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 shadow-sm">
        <StepHead n="2" label="ICP Parameters"/>
        <ICPForm cfg={cfg} set={setCfg}/>
      </div>

      <button onClick={run} disabled={!file||busy} className="w-full py-4 bg-[var(--pw-primary)] text-white font-bold rounded-xl hover:bg-blue-900 transition-all disabled:opacity-40 flex items-center justify-center gap-2 shadow-lg mb-2 text-sm">
        {busy?<><span className="pulse-dot inline-block w-2 h-2 bg-white rounded-full mr-1"></span>Scoring {progress}%...</>:<><Icon name="zap" size={17}/>Run TAL Analysis</>}
      </button>
      {busy&&<div className="w-full h-1.5 bg-gray-200 rounded-full mb-6 overflow-hidden"><div className="h-full bg-blue-600 rounded-full progress-bar" style={{width:`${progress}%`}}/></div>}
      {!busy&&<div className="mb-6"/>}

      {results&&(
        <div className="fade-in">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
            <StepHead n="3" label="Results" color="green"/>
            <div className="flex flex-wrap gap-2">
              {['all','Tier 1','Tier 2','Tier 3'].map(t=>{
                const cnt=t==='all'?results.length:results.filter(r=>r._tier===t).length;
                const act=filter===t;
                return <button key={t} onClick={()=>setFilter(t)} className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${act?t==='all'?'bg-gray-900 text-white':t==='Tier 1'?'bg-green-700 text-white':t==='Tier 2'?'bg-yellow-600 text-white':'bg-red-700 text-white':'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>{t==='all'?`All (${results.length})`:` ${t} (${cnt})`}</button>;
              })}
            </div>
          </div>
          <SummaryCards results={results}/>
          <ResultsTable results={filtered} cols={cols}/>
          <ExportBar results={results} prefix="Narrowed_TAL"/>
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   EXPAND TAL VIEW
════════════════════════════════════ */
const ExpandView = () => {
  const [origFile,setOrig]=useState(null);
  const [expFile,setExp]=useState(null);
  const [cfg,setCfg]=useState({industries:[],minEmp:0,maxEmp:0,geos:[],jobFunctions:[],exclusions:[],targetCount:0});
  const [results,setResults]=useState(null);
  const [busy,setBusy]=useState(false);
  const [progress,setProgress]=useState(0);
  const [cm,setCm]=useState({});

  useEffect(()=>{
    if(origFile){ const m={}; Object.keys(COL_ALIASES).forEach(t=>{const d=detectCol(origFile.headers,t);if(d)m[t]=d;}); setCm(m); }
  },[origFile]);

  const norm=s=>String(s||'').toLowerCase().trim().replace(/[.,\s\-&]+/g,' ').trim();
  const normDomain=s=>String(s||'').toLowerCase().trim().replace(/^(https?:\/\/)?(www\.)?/,'').replace(/\/.*/,'').replace(/[.\s]+/g,'');

  const run=()=>{
    if(!origFile||!expFile){ toast('Upload both files first','error'); return; }
    setBusy(true); setProgress(5); setResults(null);

    setTimeout(()=>{
      // Build fingerprint set from ALL original TAL rows
      const keys=new Set();
      origFile.data.forEach(row=>{
        if(cm.company){ const n=norm(row[cm.company]); if(n) keys.add(n); }
        if(cm.website){ const d=normDomain(row[cm.website]); if(d&&d.length>3) keys.add(d); }
      });
      setProgress(20);

      // Detect columns on expansion file
      const ecm={};
      Object.keys(COL_ALIASES).forEach(t=>{const d=detectCol(expFile.headers,t);if(d)ecm[t]=d;});

      let dupsRemoved=0;
      const CHUNK=200;
      let expanded=[];
      let idx=0;

      const processChunk=()=>{
        const end=Math.min(idx+CHUNK,expFile.data.length);
        for(let i=idx;i<end;i++){
          const row=expFile.data[i];
          // Dedup check
          let dup=false;
          if(ecm.company){ const n=norm(row[ecm.company]); if(n&&keys.has(n)) dup=true; }
          if(!dup&&ecm.website){ const d=normDomain(row[ecm.website]); if(d&&d.length>3&&keys.has(d)) dup=true; }
          if(dup){ dupsRemoved++; continue; }
          // Exclusions
          const cn=ecm.company?norm(row[ecm.company]):'';
          if(cfg.exclusions.some(ex=>ex&&cn.includes(ex.toLowerCase()))){ dupsRemoved++; continue; }
          const {score,reasons}=scoreAccount(row,cfg,ecm);
          expanded.push({...row,_score:score,_tier:assignTier(score),_reasons:reasons.join(' | ')||'Expansion candidate'});
        }
        idx=end;
        setProgress(20+Math.round((idx/expFile.data.length)*75));

        if(idx<expFile.data.length){
          setTimeout(processChunk,0);
        } else {
          expanded.sort((a,b)=>b._score-a._score);
          if(cfg.targetCount>0&&expanded.length>cfg.targetCount) expanded=expanded.slice(0,cfg.targetCount);
          setResults({accounts:expanded,dupsRemoved,ecm});
          setBusy(false); setProgress(100);
          toast(`Done: ${expanded.length.toLocaleString()} net-new accounts · ${dupsRemoved} originals excluded`);
        }
      };
      setTimeout(processChunk,0);
    },50);
  };

  const cols=useMemo(()=>!results?[]:['company','industry','employees','country','revenue'].map(t=>results.ecm[t]).filter(Boolean).slice(0,5),[results]);

  return (
    <div className="max-w-5xl mx-auto pb-20 fade-in">
      <div className="mb-5">
        <h2 className="text-2xl font-black text-gray-900">Expand TAL — Lookalikes</h2>
        <p className="text-sm text-gray-500 mt-1">Find net-new lookalike accounts. All original TAL companies are strictly excluded from the output.</p>
      </div>

      <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-xl mb-4 flex gap-3">
        <Icon name="shield-check" size={17} className="text-blue-600 mt-0.5 shrink-0"/>
        <p className="text-sm text-blue-800"><strong>Strict Dedup Protection:</strong> Every company name and domain from File A is excluded from expansion output. Zero overlap guaranteed.</p>
      </div>

      <div className="grid grid-cols-2 gap-4 mb-4">
        {[
          {lbl:'A',title:'Original TAL',sub:'(exclusion list)',color:'orange-500',state:origFile,setFn:setOrig,clearFn:()=>{setOrig(null);setResults(null);setCm({});}},
          {lbl:'B',title:'Expansion Source',sub:'(prospect pool)',color:'purple-500',state:expFile,setFn:setExp,clearFn:()=>{setExp(null);setResults(null);}},
        ].map(({lbl,title,sub,color,state,setFn,clearFn})=>(
          <div key={lbl} className="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
            <h3 className="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
              <span className={`w-6 h-6 bg-${color} text-white rounded-full flex items-center justify-center text-xs font-black`}>{lbl}</span>
              {title} <span className="text-gray-400 font-normal">{sub}</span>
            </h3>
            <FileDrop onLoad={setFn} file={state} onClear={clearFn} label={`Upload ${title}`}/>
          </div>
        ))}
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 shadow-sm">
        <h3 className="text-sm font-bold text-gray-800 mb-3">ICP Parameters (for scoring expansion accounts)</h3>
        <ICPForm cfg={cfg} set={setCfg}/>
      </div>

      <button onClick={run} disabled={!origFile||!expFile||busy} className="w-full py-4 bg-purple-700 text-white font-bold rounded-xl hover:bg-purple-800 transition-all disabled:opacity-40 flex items-center justify-center gap-2 shadow-lg mb-2 text-sm">
        {busy?<><span className="pulse-dot inline-block w-2 h-2 bg-white rounded-full mr-1"></span>Finding lookalikes {progress}%...</>:<><Icon name="users" size={17}/>Find Lookalike Accounts</>}
      </button>
      {busy&&<div className="w-full h-1.5 bg-gray-200 rounded-full mb-6 overflow-hidden"><div className="h-full bg-purple-600 rounded-full progress-bar" style={{width:`${progress}%`}}/></div>}
      {!busy&&<div className="mb-6"/>}

      {results&&(
        <div className="fade-in">
          {results.dupsRemoved>0&&(
            <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 mb-4 flex items-center gap-3">
              <div className="w-9 h-9 bg-orange-100 rounded-lg flex items-center justify-center shrink-0"><Icon name="shield-alert" size={17} className="text-orange-600"/></div>
              <div>
                <p className="text-sm font-bold text-orange-800">{results.dupsRemoved.toLocaleString()} accounts removed (original TAL duplicates + exclusions)</p>
                <p className="text-xs text-orange-600">Matched on company name and/or domain — guaranteed excluded from output.</p>
              </div>
            </div>
          )}
          <SummaryCards results={results.accounts}/>
          <ResultsTable results={results.accounts} cols={cols}/>
          <ExportBar results={results.accounts} prefix="Expanded_TAL_Lookalikes"/>
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════
   LEAD QA VIEW
════════════════════════════════════ */
const LeadQAView = () => {
  const [file,setFile]=useState(null);
  const [jobFunctions,setJF]=useState('');
  const [results,setResults]=useState(null);
  const [busy,setBusy]=useState(false);
  const [cm,setCm]=useState({});

  useEffect(()=>{
    if(file){ const m={}; Object.keys(COL_ALIASES).forEach(t=>{const d=detectCol(file.headers,t);if(d)m[t]=d;}); setCm(m); }
  },[file]);

  const run=()=>{
    if(!file){ toast('Upload a leads file first','error'); return; }
    const fns=jobFunctions.split('\n').map(x=>x.trim()).filter(Boolean);
    if(!fns.length){ toast('Enter at least one job function to validate against','warn'); return; }
    setBusy(true);

    setTimeout(()=>{
      const out=file.data.map(row=>{
        const title=String(row[cm.title]||row['Title']||row['Job Title']||'').toLowerCase();
        const match=fns.find(fn=>title.includes(fn.toLowerCase()));
        const qualified=!!match;
        return {
          ...row,
          'QA Result': qualified?'YES':'NO',
          'Job Function Alignment': qualified?match:'No match',
          '_tier': qualified ? (title.includes('vp')||title.includes('director')||title.includes('head')||title.includes('chief')||title.includes('c-')||title.includes('cxo')?'Tier 1':'Tier 2') : 'Tier 3',
          '_reasons': qualified?`Title matches: ${match}`:'No function match',
          '_score': qualified?80:20,
        };
      });

      const yes=out.filter(r=>r['QA Result']==='YES').length;
      const no=out.length-yes;
      setResults(out); setBusy(false);
      toast(`QA complete: ${yes} qualifying (${Math.round(yes/out.length*100)}%) · ${no} rejected`);
    },200);
  };

  const cols=useMemo(()=>{
    if(!file) return [];
    const priority=['company','title','industry','country'];
    return priority.map(t=>cm[t]).filter(Boolean).slice(0,4);
  },[file,cm]);

  const exportQA=()=>{
    if(!results) return;
    const date=new Date().toISOString().slice(0,10);
    const data=results.map(row=>{
      const clean={};
      Object.keys(row).forEach(k=>{
        if(k==='_score'||k==='_tier'||k==='_reasons') return;
        clean[k]=row[k];
      });
      return clean;
    });
    exportToExcel(data,`Lead_QA_${date}.xlsx`,'Lead Validation');
  };

  return (
    <div className="max-w-4xl mx-auto pb-20 fade-in">
      <div className="mb-5">
        <h2 className="text-2xl font-black text-gray-900">Lead QA / Validation</h2>
        <p className="text-sm text-gray-500 mt-1">Validate lead titles against target job functions. Outputs YES/NO with function alignment.</p>
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 shadow-sm">
        <StepHead n="1" label="Upload Leads File"/>
        <FileDrop onLoad={setFile} file={file} onClear={()=>{setFile(null);setResults(null);setCm({});}}/>
        {file&&cm.title&&<p className="text-xs text-blue-700 mt-2 font-semibold">✓ Title column detected: <em>{cm.title}</em></p>}
        {file&&!cm.title&&<p className="text-xs text-amber-600 mt-2 font-semibold">⚠ No title column auto-detected. Ensure a column is named "Title" or "Job Title".</p>}
      </div>

      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 shadow-sm">
        <StepHead n="2" label="Target Job Functions"/>
        <textarea value={jobFunctions} onChange={e=>setJF(e.target.value)}
          placeholder="One per line — e.g.:&#10;VP of Finance&#10;Director of Finance&#10;Head of Finance&#10;Chief Financial Officer&#10;CFO&#10;Finance Director"
          className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none h-36"/>
        <p className="text-xs text-gray-400 mt-2">Matching is case-insensitive and partial — "Finance" will match "Director of Finance", "VP Finance", "Finance Manager" etc.</p>
      </div>

      <button onClick={run} disabled={!file||busy} className="w-full py-4 bg-[var(--pw-primary)] text-white font-bold rounded-xl hover:bg-blue-900 transition-all disabled:opacity-40 flex items-center justify-center gap-2 shadow-lg mb-6 text-sm">
        {busy?<><span className="pulse-dot inline-block w-2 h-2 bg-white rounded-full mr-1"></span>Validating...</>:<><Icon name="check-circle" size={17}/>Run Lead QA</>}
      </button>

      {results&&(
        <div className="fade-in">
          {/* QA Stats Bar */}
          <div className="grid grid-cols-3 gap-3 mb-5">
            {[
              ['Total Leads',results.length,'gray-900','white','border-gray-200'],
              ['Qualifying (YES)',results.filter(r=>r['QA Result']==='YES').length,'green-700','green-50','border-green-200'],
              ['Rejected (NO)',results.filter(r=>r['QA Result']==='NO').length,'red-700','red-50','border-red-200'],
            ].map(([lbl,val,tc,bg,bc])=>(
              <div key={lbl} className={`bg-${bg} rounded-xl p-4 border ${bc} text-center`}>
                <p className={`text-2xl font-black text-${tc}`}>{val.toLocaleString()}</p>
                <p className={`text-xs text-${tc} font-semibold mt-1 opacity-80`}>{lbl}</p>
              </div>
            ))}
          </div>

          {/* Preview table */}
          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden mb-4">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-50 border-b border-gray-200">
                  {cols.map(c=><th key={c} className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider whitespace-nowrap">{c}</th>)}
                  <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">QA Result</th>
                  <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Alignment</th>
                </tr></thead>
                <tbody>
                  {results.slice(0,30).map((r,i)=>(
                    <tr key={i} className="border-b border-gray-100 hover:bg-gray-50">
                      {cols.map(c=><td key={c} className="px-4 py-3 text-gray-700 max-w-[160px] truncate">{r[c]}</td>)}
                      <td className="px-4 py-3">
                        <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${r['QA Result']==='YES'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>{r['QA Result']}</span>
                      </td>
                      <td className="px-4 py-3 text-xs text-gray-600 max-w-[180px] truncate">{r['Job Function Alignment']}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {results.length>30&&<p className="px-4 py-2 text-xs text-gray-400 bg-gray-50 border-t border-gray-100">Showing 30 of {results.length.toLocaleString()} — download Excel for full list</p>}
          </div>

          <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm flex items-center justify-between">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center"><Icon name="file-spreadsheet" size={16} className="text-green-700"/></div>
              <div><p className="text-sm font-bold text-gray-800">Download Full QA Report</p><p className="text-xs text-gray-500">All {results.length.toLocaleString()} leads with YES/NO + alignment columns</p></div>
            </div>
            <button onClick={exportQA} className="px-5 py-2.5 bg-gray-900 text-white text-xs font-bold rounded-lg hover:bg-gray-800 flex items-center gap-1.5">
              <Icon name="download" size={14}/> Download Excel
            </button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════

const SweetSpotView = () => {

  const generate=()=>{
    if(!inp.product&&!inp.client){ toast('Enter the product or client name','error'); return; }
    const lbl=inp.client?`${inp.product} (${inp.client})`:inp.product;
    const personas=inp.personas.split('\n').filter(Boolean);

      sweetSpot:`The ideal target for ${lbl} is ${personas[0]||'senior decision-makers'} in ${inds.slice(0,2).join(' and ')||'target industries'} who are actively experiencing ${pains[0]||'key operational challenges'}.`,

      {Field:'Sweet Spot',Value:result.sweetSpot},
      {Field:'Primary Personas',Value:result.personas.join('; ')},
      {Field:'Target Industries',Value:result.inds.join('; ')},
      {Field:'Company Size',Value:result.companySize},
      {Field:'Target Regions',Value:result.regions},
      {Field:'Key Pain Points',Value:result.pains.join('; ')},

      {Field:'Competitors to Exclude',Value:result.excl.join('; ')},
      {Field:'Campaign Objective',Value:inp.objective||'Lead generation'},

Key Pain Points:
${inp.painPoints||'[Add pain points]'}
Target Personas:

    </div>
  );

const PCATS=['All','TAL Creation','Campaign Ops','Client Comms','Reporting'];
const PTAG={TAL:'bg-blue-100 text-blue-700',Ops:'bg-orange-100 text-orange-700',Client:'bg-purple-100 text-purple-700',Report:'bg-teal-100 text-teal-700'};

const PromptLib=()=>{
  const [q,setQ]=useState('');
  const [cat,setCat]=useState('All');
  const [copiedId,setCopied]=useState(null);
  const [open,setOpen]=useState(null);
  const filtered=useMemo(()=>PROMPTS.filter(p=>(cat==='All'||p.cat===cat)&&(!q||[p.title,p.desc,p.tag,p.cat].some(f=>f.toLowerCase().includes(q.toLowerCase())))),[q,cat]);
  const copy=(p,id)=>{
    navigator.clipboard.writeText(p).catch(()=>{const ta=document.createElement('textarea');ta.value=p;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
    setCopied(id); toast('Prompt copied!'); setTimeout(()=>setCopied(null),2500);
  };
  return (
    <div className="max-w-4xl mx-auto pb-20 fade-in">
      <div className="mb-5 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div><h2 className="text-2xl font-black text-gray-900">Prompt Library</h2><p className="text-sm text-gray-500 mt-1">{PROMPTS.length} playbook prompts — copy into any AI assistant</p></div>
        <div className="relative"><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search..." className="pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 w-48"/><Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/></div>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        {PCATS.map(c=><button key={c} onClick={()=>setCat(c)} className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${cat===c?'bg-[var(--pw-primary)] text-white':'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`}>{c}{c!=='All'&&` (${PROMPTS.filter(p=>p.cat===c).length})`}</button>)}
      </div>
      <div className="space-y-2">
        {filtered.map(p=>(
          <div key={p.id} className="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
            <div className="flex items-center justify-between p-4 cursor-pointer" onClick={()=>setOpen(open===p.id?null:p.id)}>
              <div className="flex items-center gap-3 min-w-0">
                <span className={`${PTAG[p.tag]||'bg-gray-100 text-gray-600'} text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider shrink-0`}>{p.tag}</span>
                <div className="min-w-0"><h3 className="text-sm font-bold text-gray-900">{p.title}</h3><p className="text-xs text-gray-500 truncate">{p.desc}</p></div>
              </div>
              <div className="flex items-center gap-2 ml-3 shrink-0">
                <button onClick={e=>{e.stopPropagation();copy(p.prompt,p.id);}} className={`px-3 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1 transition-all ${copiedId===p.id?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}><Icon name={copiedId===p.id?'check':'copy'} size={12}/>{copiedId===p.id?'Copied':'Copy'}</button>
                <Icon name={open===p.id?'chevron-up':'chevron-down'} size={15} className="text-gray-400"/>
              </div>
            </div>
            {open===p.id&&<div className="border-t border-gray-100 px-4 pb-4 pt-3 fade-in"><pre className="bg-gray-50 border border-gray-100 rounded-lg p-3.5 text-xs text-gray-600 whitespace-pre-wrap leading-relaxed overflow-auto max-h-56">{p.prompt}</pre></div>}
          </div>
        ))}
        {!filtered.length&&<div className="text-center py-10 text-gray-400"><Icon name="search" size={28} className="mx-auto mb-2 text-gray-200"/><p className="text-sm">No prompts match</p></div>}
      </div>
    </div>
  );
};
