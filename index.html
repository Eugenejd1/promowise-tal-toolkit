<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promowise TAL Toolkit | Campaign Ops</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--pw:#1E1E54;--pwl:#eff6ff;--pink:#db2777;--grn:#059669;--bg:#f3f4f6}
    *{box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#1f2937;margin:0;height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
    .fi{animation:fi .3s ease forwards}@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .t1{background:#dcfce7;color:#166534;border-color:#86efac}
    .t2{background:#fef9c3;color:#854d0e;border-color:#fde047}
    .t3{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
    .dz{border:2px dashed #cbd5e1;transition:all .2s}
    .dz.ov{border-color:#3b82f6;background:#eff6ff}
    .pd{animation:pd 1.4s infinite}@keyframes pd{0%,100%{opacity:1}50%{opacity:.25}}
    .slbl{padding:12px 18px 3px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em}
    .pb{transition:width .3s}
    .xlb{background:#217346;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
    input,textarea,select{outline:none}
    input:focus,textarea:focus,select:focus{box-shadow:0 0 0 2px #93c5fd}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ── SVG ICONS (inline — no CDN dependency) ── */

  info:`<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>`,

const Ic=({n,size=18,cls=''})=>{
  const p=ICONS[n]||'';
  return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cls} style={{flexShrink:0,display:'inline-block'}} dangerouslySetInnerHTML={{__html:p}}/>;
};

/* ── TOAST ── */
const toast=(msg,type='success')=>{
  const c={success:'#059669',error:'#DC2626',info:'#2563EB',warn:'#D97706'};
  const el=document.createElement('div');
  el.textContent=msg;
  Object.assign(el.style,{position:'fixed',bottom:'28px',left:'50%',transform:'translateX(-50%)',
    background:c[type]||c.info,color:'#fff',padding:'10px 24px',borderRadius:'12px',
    boxShadow:'0 8px 32px rgba(0,0,0,.18)',zIndex:'9999',fontSize:'13px',fontWeight:'700',whiteSpace:'nowrap',
    animation:'none',pointerEvents:'none'});
  document.body.appendChild(el);
  setTimeout(()=>{try{document.body.removeChild(el)}catch{}},3200);
};

/* ── EXCEL EXPORT ── */
const exportXL=(data,filename,sheet='Results')=>{
  if(!data||!data.length){toast('No data to export','error');return;}
  try{
    const ws=XLSX.utils.json_to_sheet(data);
    const cols=Object.keys(data[0]);
    ws['!cols']=cols.map(k=>({wch:Math.min(50,Math.max(12,k.length,...data.slice(0,50).map(r=>String(r[k]||'').length)))}));
    const rng=XLSX.utils.decode_range(ws['!ref']);
    for(let C=rng.s.c;C<=rng.e.c;C++){
      const a=XLSX.utils.encode_cell({r:0,c:C});
      if(ws[a])ws[a].s={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1E1E54'}},alignment:{horizontal:'center'}};
    }
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,sheet);
    XLSX.writeFile(wb,filename.endsWith('.xlsx')?filename:filename+'.xlsx');
    toast('✓ Downloading '+filename);
  }catch(e){toast('Export failed: '+e.message,'error');}
};

/* ── COLUMN DETECTION ── */
const COL_AL={
  company:['company','company name','account','account name','organization','org','company_name','account_name','name'],
  industry:['industry','sector','vertical','industry_type','sub_industry','primary_industry','industry name'],
  employees:['employees','employee count','company size','headcount','number of employees','employee_count','num_employees','size','# employees','employees range'],
  revenue:['revenue','annual revenue','estimated revenue','annual_revenue','revenue_range','company_revenue','revenue range'],
  country:['country','region','geo','geography','location','hq country','headquarters','hq_country','country/region'],
  website:['website','domain','url','company url','website_url','company_url','web site','homepage'],
  title:['title','job title','job_title','contact title','role','position'],
  city:['city','hq city','hq_city','headquarters city'],
  state:['state','hq state','hq_state','province'],
  email:['email','email address','work email','business email'],
  phone:['phone','phone number','mobile','direct phone'],
};
const detCol=(hdrs,type)=>{
  const al=COL_AL[type]||[];
  const lo=hdrs.map(h=>String(h).toLowerCase().trim());
  for(const a of al){const i=lo.indexOf(a);if(i>=0)return hdrs[i];}
  for(const a of al){const i=lo.findIndex(h=>h.includes(a));if(i>=0)return hdrs[i];}
  return null;
};
const buildCM=(hdrs)=>{const m={};Object.keys(COL_AL).forEach(t=>{const d=detCol(hdrs,t);if(d)m[t]=d;});return m;};

/* ── PARSERS ── */
const parseEmp=v=>{
  if(v==null)return 0;
  const s=String(v).replace(/,/g,'').trim();
  if(s.includes('-')){const p=s.split('-').map(x=>parseInt(x.replace(/\D/g,''))||0);return Math.round((p[0]+p[1])/2);}
  if(s.includes('+'))return parseInt(s)||0;
  const k=s.match(/^(\d+\.?\d*)k$/i);if(k)return Math.round(parseFloat(k[1])*1000);
  return parseInt(s)||0;
};
const parseRev=v=>{
  if(v==null)return 0;
  const s=String(v).toLowerCase().replace(/[$,\s]/g,'').trim();
  const b=s.match(/^(\d+\.?\d*)b/);if(b)return parseFloat(b[1])*1e9;
  const m=s.match(/^(\d+\.?\d*)m/);if(m)return parseFloat(m[1])*1e6;
  const k=s.match(/^(\d+\.?\d*)k/);if(k)return parseFloat(k[1])*1e3;
  return parseFloat(s)||0;
};

/* ── SCORING ENGINE ── */
const scoreRow=(row,cfg,cm)=>{
  let score=0,max=0;
  const reasons=[];
  if(cfg.industries.length>0&&cm.industry){
    max+=30;
    const ri=String(row[cm.industry]||'').toLowerCase();
    const ex=cfg.industries.find(i=>ri.includes(i.toLowerCase()));
    if(ex){score+=30;reasons.push('Industry: '+ex);}
    else{const pt=cfg.industries.find(i=>i.toLowerCase().split(/\s+/).some(w=>w.length>3&&ri.includes(w)));if(pt){score+=15;reasons.push('Partial industry: '+pt);}}
  }
  if((cfg.minEmp>0||cfg.maxEmp>0)&&cm.employees){
    max+=25;
    const emp=parseEmp(row[cm.employees]);
    if(emp>0){
      const mn=cfg.minEmp||0,mx=cfg.maxEmp||Infinity;
      if(emp>=mn&&emp<=mx){score+=25;reasons.push('Size: in range');}
      else if(emp>=mn*.6&&emp<=mx*1.4){score+=12;reasons.push('Size: near range');}
    }
  }
  if(cfg.geos.length>0&&cm.country){
    max+=20;
    const rg=String(row[cm.country]||'').toLowerCase();
    const mg=cfg.geos.find(g=>rg.includes(g.toLowerCase())||g.toLowerCase().includes(rg));
    if(mg){score+=20;reasons.push('Geo: '+mg);}
  }
  if(cm.revenue){
    max+=15;
    const rv=parseRev(row[cm.revenue]);
    if(rv>=50e6){score+=15;reasons.push('Revenue: large');}
    else if(rv>=10e6){score+=10;reasons.push('Revenue: mid-market');}
    else if(rv>=1e6){score+=5;reasons.push('Revenue: SMB');}
  }
  if(cfg.jobFunctions.length>0&&cm.title){
    max+=10;
    const rt=String(row[cm.title]||'').toLowerCase();
    const mt=cfg.jobFunctions.find(jf=>rt.includes(jf.toLowerCase()));
    if(mt){score+=10;reasons.push('Title: '+mt);}
  }
  const pct=max>0?Math.round((score/max)*100):50;
  return{score:pct,reasons};
};

const assignTier=s=>s>=70?'Tier 1':s>=40?'Tier 2':'Tier 3';
const TLBL={'Tier 1':'High Priority','Tier 2':'Medium Priority','Tier 3':'Low Priority'};
const tlbl=t=>TLBL[t]||t;

const buildRow=row=>{
  const out={};
  Object.keys(row).forEach(k=>{
    if(k==='_score')return;
    if(k==='_tier'){out['Tier']=row[k];out['Priority Level']=tlbl(row[k]);return;}
    if(k==='_reasons'){out['Fit Reasoning']=row[k];return;}
    out[k]=row[k];
  });
  return out;
};

/* ── NORM for dedup ── */
const norm=s=>String(s||'').toLowerCase().trim().replace(/[.,\s\-&]+/g,' ').trim();
const normDom=s=>String(s||'').toLowerCase().trim().replace(/^(https?:\/\/)?(www\.)?/,'').replace(/\/.*/,'').replace(/[.\s]+/g,'');

/* ══════════════════════
   SHARED UI COMPONENTS
══════════════════════ */
const TierBadge=({tier})=>{
  const cls=tier==='Tier 1'?'t1':tier==='Tier 2'?'t2':'t3';
  return <span className={`${cls} inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-full border whitespace-nowrap`}>{tier} — {tlbl(tier)}</span>;
};

const FileDrop=({onLoad,file,onClear,label='Drop TAL file here'})=>{
  const [over,setOver]=useState(false);
  const ref=useRef(null);
  const process=f=>{
    if(!f)return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!data.length){toast('File is empty or unreadable','error');return;}
        onLoad({name:f.name,data,headers:Object.keys(data[0]),rowCount:data.length});
      }catch(err){toast('Parse error — ensure .xlsx/.xls/.csv: '+err.message,'error');}
    };
    r.onerror=()=>toast('Could not read file','error');
    r.readAsArrayBuffer(f);
  };
  if(file)return(
    <div className="bg-green-50 border border-green-200 rounded-xl p-3.5 flex items-center justify-between">
      <div className="flex items-center gap-3">
        <div className="w-9 h-9 bg-green-100 rounded-lg flex items-center justify-center shrink-0 text-green-600"><Ic n="file-check" size={17}/></div>
        <div><p className="text-sm font-bold text-green-800 truncate max-w-[220px]">{file.name}</p><p className="text-xs text-green-600">{file.rowCount.toLocaleString()} rows · {file.headers.length} columns</p></div>
      </div>
      <button onClick={onClear} className="text-green-400 hover:text-red-500 p-1 rounded hover:bg-red-50 transition"><Ic n="x" size={15}/></button>
    </div>
  );
  return(
    <div className={`dz rounded-xl p-7 text-center cursor-pointer${over?' ov':''}`}
      onDragOver={e=>{e.preventDefault();setOver(true)}}
      onDragLeave={()=>setOver(false)}
      onDrop={e=>{e.preventDefault();setOver(false);process(e.dataTransfer.files[0])}}
      onClick={()=>ref.current?.click()}>
      <input ref={ref} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={e=>process(e.target.files[0])}/>
      <div className="w-11 h-11 bg-gray-100 rounded-xl flex items-center justify-center mx-auto mb-2.5 text-gray-400"><Ic n="upload" size={20}/></div>
      <p className="text-sm font-bold text-gray-700">{label}</p>
      <p className="text-xs text-gray-400 mt-1">Excel (.xlsx / .xls) or CSV</p>
    </div>
  );
};

const ICPForm=({cfg,set})=>(
  <div className="space-y-3.5">
    {[
      {label:'Target Industries',key:'industries',type:'textarea',ph:'Financial Services\nHealthcare\nTechnology\nManufacturing',note:'one per line'},
      {label:'Job Functions / Titles',key:'jobFunctions',type:'textarea',ph:'VP of Finance\nDirector of IT\nCISO\nHead of Operations',note:'one per line'},
    ].map(({label,key,ph,note})=>(
      <div key={key}>
        <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">{label} <span className="text-gray-400 font-normal normal-case">({note})</span></label>
        <textarea value={cfg[key].join('\n')} onChange={e=>set({...cfg,[key]:e.target.value.split('\n').filter(x=>x.trim())})}
          placeholder={ph} className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm resize-none h-20"/>
      </div>
    ))}
    <div className="grid grid-cols-2 gap-3">
      <div>
        <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Min Employees</label>
        <input type="number" value={cfg.minEmp||''} onChange={e=>set({...cfg,minEmp:parseInt(e.target.value)||0})} placeholder="e.g. 100" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/>
      </div>
      <div>
        <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Max Employees</label>
        <input type="number" value={cfg.maxEmp||''} onChange={e=>set({...cfg,maxEmp:parseInt(e.target.value)||0})} placeholder="e.g. 5000" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/>
      </div>
    </div>
    <div>
      <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Target Geographies <span className="text-gray-400 font-normal normal-case">(comma-separated)</span></label>
      <input type="text" value={cfg.geos.join(', ')} onChange={e=>set({...cfg,geos:e.target.value.split(',').map(x=>x.trim()).filter(Boolean)})} placeholder="United States, United Kingdom, Canada" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/>
    </div>
    <div>
      <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Exclusions <span className="text-gray-400 font-normal normal-case">(comma-separated company names)</span></label>
      <input type="text" value={cfg.exclusions.join(', ')} onChange={e=>set({...cfg,exclusions:e.target.value.split(',').map(x=>x.trim()).filter(Boolean)})} placeholder="Competitor A, Competitor B" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/>
    </div>
    <div>
      <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Target Account Count <span className="text-gray-400 font-normal normal-case">(0 = no limit)</span></label>
      <input type="number" value={cfg.targetCount||''} onChange={e=>set({...cfg,targetCount:parseInt(e.target.value)||0})} placeholder="e.g. 300" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/>
    </div>
  </div>
);

const SumCards=({results})=>{
  const t1=results.filter(r=>r._tier==='Tier 1').length;
  const t2=results.filter(r=>r._tier==='Tier 2').length;
  const t3=results.filter(r=>r._tier==='Tier 3').length;
  return(
    <div className="grid grid-cols-4 gap-3 mb-5 fi">
      {[['Total',results.length,'text-gray-900','bg-white','border-gray-200'],
        ['Tier 1 — High',t1,'text-green-700','bg-green-50','border-green-200'],
        ['Tier 2 — Medium',t2,'text-yellow-700','bg-yellow-50','border-yellow-200'],
        ['Tier 3 — Low',t3,'text-red-700','bg-red-50','border-red-200']
      ].map(([lbl,val,tc,bg,bc])=>(
        <div key={lbl} className={`${bg} rounded-xl p-4 border ${bc} text-center`}>
          <p className={`text-2xl font-black ${tc}`}>{val.toLocaleString()}</p>
          <p className={`text-xs ${tc} font-semibold mt-1 opacity-80`}>{lbl}</p>
        </div>
      ))}
    </div>
  );
};

const ResTable=({results,cols})=>{
  const [page,setPage]=useState(0);
  const PER=25,total=Math.ceil(results.length/PER);
  useEffect(()=>setPage(0),[results]);
  const rows=results.slice(page*PER,(page+1)*PER);
  return(
    <div className="bg-white rounded-xl border border-gray-200 overflow-hidden fi">
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="bg-gray-50 border-b border-gray-200">
              <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Tier</th>
              {cols.map(c=><th key={c} className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider whitespace-nowrap">{c}</th>)}
              <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Fit Reasoning</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={i} className="border-b border-gray-100 hover:bg-gray-50">

/* Lookalike generation engine:
   Analyses the uploaded TAL to extract ICP profile (top industries, size range, geos),
   then generates synthetic lookalike companies based on that profile.
   These are clearly flagged as "suggested lookalike profiles" for the CM to use
   as search criteria in their data provider (ZoomInfo, Apollo, Cognism etc.) */

const INDUSTRY_LOOKALIKES={
  'financial services':['Fintech','Insurance','Banking','Asset Management','Wealth Management','Capital Markets','Credit Unions','Mortgage Lending','Investment Banking','Private Equity'],
  'technology':['SaaS','Software','Cloud Computing','Cybersecurity','AI/ML','Data Analytics','DevOps','IT Services','Digital Transformation','Enterprise Software'],
  'healthcare':['Healthtech','Medtech','Pharmaceutical','Biotech','Health Insurance','Hospital Networks','Medical Devices','Digital Health','Life Sciences','Clinical Research'],
  'manufacturing':['Industrial Automation','Supply Chain','Logistics','Automotive','Aerospace','Chemical Manufacturing','Consumer Goods','Electronics Manufacturing','Heavy Industry','Precision Engineering'],
  'retail':['E-commerce','D2C Brands','Omnichannel Retail','Grocery','Fashion & Apparel','Consumer Brands','Marketplace Platforms','Retail Tech','Luxury Goods','FMCG'],
  'professional services':['Management Consulting','Legal Services','Accounting','Staffing & Recruitment','Marketing Agencies','PR & Communications','Business Process Outsourcing','Advisory Services','Executive Search','Training & Development'],
  'media':['Digital Media','Publishing','Advertising Technology','Content Platforms','Streaming Services','Events & Exhibitions','Sports & Entertainment','Broadcasting','Creative Agencies','Out-of-Home Media'],
  'education':['EdTech','Corporate Learning','Higher Education','K-12 Technology','Professional Certification','Learning Management','Skills Development','Online Learning','Training Platforms'],
  'real estate':['PropTech','Commercial Real Estate','Property Management','Real Estate Investment','Facilities Management','Construction Tech','Smart Buildings','Co-working Spaces'],
  'energy':['CleanTech','Renewable Energy','Oil & Gas Tech','Utilities','Energy Management','Smart Grid','EV Infrastructure','Carbon Management'],
};

const SIZE_BANDS=[
  {min:50,max:200,label:'50–200 employees (SMB)'},
  {min:200,max:1000,label:'200–1,000 employees (Mid-Market Lower)'},
  {min:1000,max:5000,label:'1,000–5,000 employees (Mid-Market Upper)'},
  {min:5000,max:20000,label:'5,000–20,000 employees (Enterprise)'},
  {min:20000,max:Infinity,label:'20,000+ employees (Global Enterprise)'},
];

const GEO_EXPAND={
  'united states':['Canada','United Kingdom','Australia','Germany','Netherlands'],
  'uk':['Ireland','Germany','France','Netherlands','Nordics','Belgium'],
  'united kingdom':['Ireland','Germany','France','Netherlands','Nordics','Belgium'],
  'australia':['New Zealand','Singapore','Malaysia','Hong Kong','Japan'],
  'germany':['Austria','Switzerland','Netherlands','France','Nordics','Belgium'],
  'canada':['United States','United Kingdom','Australia'],
};

const generateLookalikes=(talFile,cm,targetCount)=>{
  if(!talFile||!talFile.data.length)return[];

  // Extract ICP signals from uploaded TAL
  const industryCount={},countryCount={};
  let totalEmp=0,empCount=0;

  talFile.data.forEach(row=>{
    if(cm.industry){const v=String(row[cm.industry]||'').trim();if(v)industryCount[v]=(industryCount[v]||0)+1;}
    if(cm.country){const v=String(row[cm.country]||'').trim();if(v)countryCount[v]=(countryCount[v]||0)+1;}
    if(cm.employees){const e=parseEmp(row[cm.employees]);if(e>0){totalEmp+=e;empCount++;}}
  });

  // Top 3 industries
  const topInds=Object.entries(industryCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);
  // Top 3 geos
  const topGeos=Object.entries(countryCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);
  // Avg employee size → find band
  const avgEmp=empCount>0?Math.round(totalEmp/empCount):500;
  const band=SIZE_BANDS.find(b=>avgEmp>=b.min&&avgEmp<b.max)||SIZE_BANDS[1];

  // Find lookalike industries
  const lookalike_inds=new Set();
  topInds.forEach(ind=>{
    const lk=ind.toLowerCase();
    Object.entries(INDUSTRY_LOOKALIKES).forEach(([key,vals])=>{
      if(lk.includes(key)||key.includes(lk)){vals.forEach(v=>lookalike_inds.add(v));}
    });
  });
  // Remove original industries
  topInds.forEach(i=>lookalike_inds.delete(i));

  // Find adjacent geos
  const adj_geos=new Set();
  topGeos.forEach(g=>{
    const lk=g.toLowerCase();
    Object.entries(GEO_EXPAND).forEach(([key,vals])=>{
      if(lk.includes(key)){vals.forEach(v=>adj_geos.add(v));}
    });
  });
  topGeos.forEach(g=>adj_geos.delete(g));

  // Build lookalike profile rows
  const profiles=[];
  const lkIndArr=[...lookalike_inds];
  const lkGeoArr=[...adj_geos];
  const originalGeoArr=topGeos.length?topGeos:['United States'];
  const allGeos=[...new Set([...originalGeoArr,...lkGeoArr.slice(0,3)])];

  // Strategy 1: Same geo, lookalike industries
  lkIndArr.slice(0,8).forEach((ind,i)=>{
    profiles.push({
      'Lookalike Strategy':'Same Geo · Adjacent Industry',
      'Target Industry':ind,
      'Employee Size Range':band.label,
      'Target Geography':originalGeoArr.slice(0,2).join(', '),
      'Lookalike Basis':topInds.slice(0,2).join(', '),
      'Suggested Search':'Search for '+ind+' companies with '+band.label+' in '+originalGeoArr.slice(0,2).join('/'),
      'Priority':i<3?'High':'Medium',
      '_tier':i<3?'Tier 1':i<6?'Tier 2':'Tier 3',
      '_score':i<3?85:i<6?60:35,
      '_reasons':i<3?'Strong industry adjacency':'Adjacent industry match',
    });
  });

  // Strategy 2: Adjacent geos, same industries
  lkGeoArr.slice(0,5).forEach((geo,i)=>{
    topInds.slice(0,2).forEach(ind=>{
      profiles.push({
        'Lookalike Strategy':'Adjacent Geo · Same Industry',
        'Target Industry':ind,
        'Employee Size Range':band.label,
        'Target Geography':geo,
        'Lookalike Basis':topGeos.slice(0,2).join(', '),
        'Suggested Search':'Search for '+ind+' companies in '+geo+' with '+band.label,
        'Priority':i<2?'High':'Medium',
        '_tier':i<2?'Tier 1':'Tier 2',
        '_score':i<2?80:55,
        '_reasons':'Geographic expansion from '+topGeos[0],
      });
    });
  });

  // Strategy 3: Adjacent geo + adjacent industry
  lkGeoArr.slice(0,3).forEach(geo=>{
    lkIndArr.slice(0,3).forEach(ind=>{
      profiles.push({
        'Lookalike Strategy':'Adjacent Geo · Adjacent Industry',
        'Target Industry':ind,
        'Employee Size Range':band.label,
        'Target Geography':geo,
        'Lookalike Basis':'Expansion beyond core ICP',
        'Suggested Search':'Exploratory: '+ind+' in '+geo,
        'Priority':'Low',
        '_tier':'Tier 3',
        '_score':30,
        '_reasons':'Exploratory expansion segment',
      });
    });
  });

  // Deduplicate profiles and limit to targetCount
  const seen=new Set();
  const deduped=profiles.filter(p=>{
    const key=norm(p['Target Industry'])+':'+norm(p['Target Geography']);
    if(seen.has(key))return false;
    seen.add(key);return true;
  });

  deduped.sort((a,b)=>b._score-a._score);
  return targetCount>0?deduped.slice(0,targetCount):deduped;
};

const LeadQAView=()=>{
  const [file,setFile]=useState(null);
  const [jf,setJF]=useState('');
  const [results,setResults]=useState(null);
  const [busy,setBusy]=useState(false);
  const [cm,setCm]=useState({});

  useEffect(()=>{if(file)setCm(buildCM(file.headers));},[file]);

  const run=()=>{
    if(!file){toast('Upload a leads file first','error');return;}
    const fns=jf.split('\n').map(x=>x.trim()).filter(Boolean);
    if(!fns.length){toast('Enter at least one job function','warn');return;}
    setBusy(true);
    setTimeout(()=>{
      try{
        const out=file.data.map(row=>{
          const title=String(row[cm.title]||row['Title']||row['Job Title']||'').toLowerCase();
          const match=fns.find(fn=>title.includes(fn.toLowerCase()));
          const qualified=!!match;
          const seniority=title.match(/vp|director|head|chief|c-suite|cxo|svp|evp|president|partner|ceo|cfo|coo|cto|cmo/)?'Senior':'Other';
          return{...row,'QA Result':qualified?'YES':'NO','Job Function Alignment':qualified?match:'No match','Seniority Level':seniority,'_tier':qualified?(seniority==='Senior'?'Tier 1':'Tier 2'):'Tier 3','_reasons':qualified?'Title matches: '+match:'No function match','_score':qualified?80:20};
        });
        const yes=out.filter(r=>r['QA Result']==='YES').length;
        setResults(out);setBusy(false);
        toast(`QA complete: ${yes} qualifying (${Math.round(yes/out.length*100)}%) · ${out.length-yes} rejected`);
      }catch(err){setBusy(false);toast('Error: '+err.message,'error');}
    },200);
  };

  const cols=useMemo(()=>{
    if(!file)return[];
    return['company','title','industry','country'].map(t=>cm[t]).filter(Boolean).slice(0,4);
  },[file,cm]);

  const exportQA=()=>{
    if(!results)return;
    const date=new Date().toISOString().slice(0,10);
    const data=results.map(row=>{
      const clean={};
      Object.keys(row).forEach(k=>{if(!['_score','_tier','_reasons'].includes(k))clean[k]=row[k];});
      return clean;
    });
    exportXL(data,`Lead_QA_${date}.xlsx`,'Lead Validation');
  };

  return(
    <div className="max-w-4xl mx-auto pb-20 fi">
      <div className="mb-5"><h2 className="text-2xl font-black text-gray-900">Lead QA / Validation</h2><p className="text-sm text-gray-500 mt-1">Validate lead titles against target job functions. Outputs YES/NO + function alignment.</p></div>
      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 shadow-sm">
        <StepH n="1" label="Upload Leads File"/>
        <FileDrop onLoad={setFile} file={file} onClear={()=>{setFile(null);setResults(null);setCm({});}}/>
        {file&&cm.title&&<p className="text-xs text-blue-700 mt-2 font-semibold">✓ Title column detected: <em>{cm.title}</em></p>}
        {file&&!cm.title&&<p className="text-xs text-amber-600 mt-2 font-semibold">⚠ No title column detected — ensure a column is named "Title" or "Job Title"</p>}
      </div>
      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 shadow-sm">
        <StepH n="2" label="Target Job Functions"/>
        <textarea value={jf} onChange={e=>setJF(e.target.value)}
          placeholder={"One per line — e.g.:\nVP of Finance\nDirector of Finance\nHead of Finance\nChief Financial Officer\nCFO"}
          className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm resize-none h-36"/>
        <p className="text-xs text-gray-400 mt-2">Matching is case-insensitive and partial — "Finance" matches "VP Finance", "Director of Finance", "Finance Manager" etc.</p>
      </div>
      <button onClick={run} disabled={!file||busy}
        className="w-full py-4 text-white font-bold rounded-xl transition-all disabled:opacity-40 flex items-center justify-center gap-2 shadow-lg mb-6 text-sm"
        style={{background:'var(--pw)'}}>
        {busy?<><span className="pd inline-block w-2 h-2 bg-white rounded-full mr-1"></span>Validating...</>:<><Ic n="check-circle" size={17}/>Run Lead QA</>}
      </button>
      {results&&(
        <div className="fi">
          <div className="grid grid-cols-3 gap-3 mb-5">
            {[['Total Leads',results.length,'text-gray-900','bg-white','border-gray-200'],
              ['Qualifying (YES)',results.filter(r=>r['QA Result']==='YES').length,'text-green-700','bg-green-50','border-green-200'],
              ['Rejected (NO)',results.filter(r=>r['QA Result']==='NO').length,'text-red-700','bg-red-50','border-red-200'],
            ].map(([lbl,val,tc,bg,bc])=>(
              <div key={lbl} className={`${bg} rounded-xl p-4 border ${bc} text-center`}>
                <p className={`text-2xl font-black ${tc}`}>{val.toLocaleString()}</p>
                <p className={`text-xs ${tc} font-semibold mt-1 opacity-80`}>{lbl}</p>
              </div>
            ))}
          </div>
          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden mb-4">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-50 border-b border-gray-200">
                  {cols.map(c=><th key={c} className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider whitespace-nowrap">{c}</th>)}
                  <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">QA Result</th>
                  <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Function Alignment</th>
                  <th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wider">Seniority</th>
                </tr></thead>
                <tbody>
                  {results.slice(0,30).map((r,i)=>(
                    <tr key={i} className="border-b border-gray-100 hover:bg-gray-50">
                      {cols.map(c=><td key={c} className="px-4 py-3 text-gray-700 max-w-[160px] truncate">{r[c]}</td>)}
                      <td className="px-4 py-3"><span className={`text-xs font-bold px-2.5 py-1 rounded-full ${r['QA Result']==='YES'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>{r['QA Result']}</span></td>
                      <td className="px-4 py-3 text-xs text-gray-600 max-w-[180px] truncate">{r['Job Function Alignment']}</td>
                      <td className="px-4 py-3"><span className={`text-xs font-semibold ${r['Seniority Level']==='Senior'?'text-blue-700':'text-gray-500'}`}>{r['Seniority Level']}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {results.length>30&&<p className="px-4 py-2 text-xs text-gray-400 bg-gray-50 border-t border-gray-100">Showing 30 of {results.length.toLocaleString()} — download Excel for full list</p>}
          </div>
          <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm flex items-center justify-between">
            <div className="flex items-center gap-2 text-green-700">
              <div className="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center shrink-0"><Ic n="file-spreadsheet" size={16}/></div>
              <div><p className="text-sm font-bold text-gray-800">Download Full QA Report</p><p className="text-xs text-gray-500">All {results.length.toLocaleString()} leads with YES/NO + alignment + seniority</p></div>
            </div>
            <button onClick={exportQA} className="px-5 py-2.5 bg-gray-900 text-white text-xs font-bold rounded-lg hover:bg-gray-800 flex items-center gap-2">
              <Ic n="download" size={14}/> Download Excel
            </button>
          </div>
        </div>
      )}
    </div>
  );
};

const SweetSpotView=()=>{
  const [inp,setInp]=useState({product:'',client:'',painPoints:'',personas:'',competitors:'',industries:'',companySize:'',regions:'',objective:''});
  const [result,setResult]=useState(null);
  const u=(f,v)=>setInp(p=>({...p,[f]:v}));

  const generate=()=>{
    if(!inp.product&&!inp.client){toast('Enter the product or client name','error');return;}
    const lbl=inp.client?inp.product+' ('+inp.client+')':inp.product;
    const personas=inp.personas.split('\n').filter(Boolean);
    const pains=inp.painPoints.split('\n').filter(Boolean);
    const inds=inp.industries.split(',').map(x=>x.trim()).filter(Boolean);
    const excl=inp.competitors.split(',').map(x=>x.trim()).filter(Boolean);
    setResult({lbl,personas,pains,inds,excl,
      sweetSpot:`The ideal target for ${lbl} is ${personas[0]||'senior decision-makers'} in ${inds.slice(0,2).join(' and ')||'target industries'} who are actively experiencing ${pains[0]||'key operational challenges'}.`,
      hook:`${personas[0]||'Leaders'} in ${inds[0]||'your sector'} are losing ground because of ${(pains[0]||'unresolved challenges').toLowerCase()}. ${lbl} closes that gap — fast.`,
      companySize:inp.companySize||'Not specified',
      regions:inp.regions||'Not specified',
    });
  };

  const exportICP=()=>{
    if(!result)return;
    const rows=[
      {Field:'Product / Client',Value:result.lbl},
      {Field:'Sweet Spot',Value:result.sweetSpot},
      {Field:'Primary Personas',Value:result.personas.join('; ')},
      {Field:'Target Industries',Value:result.inds.join('; ')},
      {Field:'Company Size',Value:result.companySize},
      {Field:'Target Regions',Value:result.regions},
      {Field:'Key Pain Points',Value:result.pains.join('; ')},
      {Field:'Hook Message',Value:result.hook},
      {Field:'Competitors to Exclude',Value:result.excl.join('; ')},
      {Field:'Campaign Objective',Value:inp.objective||'Lead generation'},
    ];
    exportXL(rows,`Sweet_Spot_ICP_${result.lbl.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`,'ICP Profile');
  };

  const copyPrompt=()=>{
    const p=`You are a senior B2B ABM Campaign Strategist. Define the sweet spot and generate optimal targeting parameters.

Product/Client: ${inp.product}${inp.client?' | Client: '+inp.client:''}
Campaign Objective: ${inp.objective||'Lead generation'}
Key Pain Points:
${inp.painPoints||'[Add pain points]'}
Target Personas:
${inp.personas||'[Add personas]'}
Industries: ${inp.industries||'[Add industries]'}
Company Size: ${inp.companySize||'[Add size]'}
Regions: ${inp.regions||'[Add regions]'}
Exclude: ${inp.competitors||'None'}

Output:
1. Sweet Spot Definition (2 sentences)
2. Primary Target Audience — specific Job Titles + Seniority
3. ICP Must-Haves vs Nice-to-Haves
4. Hook Message (1 sentence)
5. 3–5 proof points
6. Recommended TAL size and tier distribution %
7. Exclusion list with reasoning`;
    navigator.clipboard.writeText(p).catch(()=>{
      const ta=document.createElement('textarea');ta.value=p;ta.style.cssText='position:fixed;left:-9999px';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    });
    toast('Prompt copied!');
  };

  return(
    <div className="max-w-3xl mx-auto pb-20 fi">
      <div className="mb-5"><h2 className="text-2xl font-black text-gray-900">Sweet Spot Generator</h2><p className="text-sm text-gray-500 mt-1">Map product value to market need. Export ICP as Excel or copy as AI prompt.</p></div>
      <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 shadow-sm space-y-3.5">
        <div className="grid grid-cols-2 gap-3">
          {[{f:'product',lbl:'Product / Solution',ph:'e.g. Adobe Experience Cloud'},{f:'client',lbl:'Client Name (optional)',ph:'e.g. Promowise'}].map(({f,lbl,ph})=>(
            <div key={f}><label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">{lbl}</label>
              <input value={inp[f]} onChange={e=>u(f,e.target.value)} placeholder={ph} className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/></div>
          ))}
        </div>
        <div><label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Campaign Objective</label>
          <input value={inp.objective} onChange={e=>u('objective',e.target.value)} placeholder="e.g. Generate 200 MQLs, expand into mid-market" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/></div>
        {[{f:'painPoints',lbl:'Key Pain Points',ph:'Fragmented customer data\nLow marketing ROI visibility'},{f:'personas',lbl:'Target Personas',ph:'VP of Marketing\nDirector of Digital\nCMO'}].map(({f,lbl,ph})=>(
          <div key={f}><label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">{lbl} <span className="text-gray-400 font-normal normal-case">(one per line)</span></label>
            <textarea value={inp[f]} onChange={e=>u(f,e.target.value)} placeholder={ph} className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm resize-none h-20"/></div>
        ))}
        <div className="grid grid-cols-3 gap-3">
          {[{f:'industries',lbl:'Industries',ph:'SaaS, Fintech, Healthcare'},{f:'companySize',lbl:'Company Size',ph:'200–5000 emp'},{f:'regions',lbl:'Regions',ph:'US, UK, ANZ'}].map(({f,lbl,ph})=>(
            <div key={f}><label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">{lbl}</label>
              <input value={inp[f]} onChange={e=>u(f,e.target.value)} placeholder={ph} className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/></div>
          ))}
        </div>
        <div><label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">Competitors to Exclude</label>
          <input value={inp.competitors} onChange={e=>u('competitors',e.target.value)} placeholder="Salesforce, HubSpot, Marketo" className="w-full p-2.5 bg-white border border-gray-200 rounded-lg text-sm"/></div>
      </div>
      <div className="flex gap-3 mb-6">
        <button onClick={generate} className="flex-1 py-3.5 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg text-sm" style={{background:'var(--pw)'}}><Ic n="target" size={17}/>Generate Sweet Spot</button>

      </div>
      {result&&(
        <div className="space-y-4 fi">
          <div className="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl border border-blue-200 p-5">
            <p className="text-xs font-black text-blue-700 uppercase tracking-wider mb-2 flex items-center gap-1.5"><Ic n="target" size={13} cls="text-blue-600"/>Sweet Spot</p>
            <p className="text-gray-900 font-semibold leading-relaxed text-sm">{result.sweetSpot}</p>
          </div>
          <div className="bg-white rounded-2xl border border-gray-200 p-5">
            <p className="text-xs font-black text-gray-600 uppercase tracking-wider mb-3">ICP Summary</p>
            <div className="grid grid-cols-2 gap-3 text-sm">
              {[['Personas',result.personas.join(', ')],['Industries',result.inds.join(', ')],['Company Size',result.companySize],['Regions',result.regions],['Pain Points',result.pains.join('; ')],['Exclude',result.excl.join(', ')||'None']].map(([k,v])=>(
                <div key={k}><p className="text-gray-400 text-[10px] font-bold uppercase mb-1">{k}</p><p className="text-gray-800 text-sm">{v||'—'}</p></div>
              ))}
            </div>
          </div>
          <div className="bg-green-50 rounded-2xl border border-green-200 p-5">
            <p className="text-xs font-black text-green-700 uppercase tracking-wider mb-2 flex items-center gap-1.5"><Ic n="message-circle" size={13} cls="text-green-600"/>Hook Message</p>
            <p className="text-green-900 font-semibold leading-relaxed italic text-sm">"{result.hook}"</p>
          </div>
          <div className="flex justify-end">
            <button onClick={exportICP} className="px-5 py-2.5 bg-gray-900 text-white text-xs font-bold rounded-xl hover:bg-gray-800 flex items-center gap-2">
              <Ic n="download" size={13}/> Export ICP as Excel
            </button>
          </div>
        </div>
      )}

  );

const PCATS=['All','TAL Creation','Campaign Ops','Client Comms','Reporting'];
const PTAG={TAL:'bg-blue-100 text-blue-700',Ops:'bg-orange-100 text-orange-700',Client:'bg-purple-100 text-purple-700',Report:'bg-teal-100 text-teal-700'};

const PromptLib=()=>{
  const [q,setQ]=useState('');
  const [cat,setCat]=useState('All');
  const [copiedId,setCopied]=useState(null);
  const [open,setOpen]=useState(null);
  const filtered=useMemo(()=>PROMPTS.filter(p=>(cat==='All'||p.cat===cat)&&(!q||[p.title,p.desc,p.tag,p.cat].some(f=>f.toLowerCase().includes(q.toLowerCase())))),[q,cat]);
  const copy=(p,id)=>{
    navigator.clipboard.writeText(p).catch(()=>{const ta=document.createElement('textarea');ta.value=p;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
    setCopied(id);toast('Prompt copied!');setTimeout(()=>setCopied(null),2500);
  };
  return(
    <div className="max-w-4xl mx-auto pb-20 fi">
      <div className="mb-5 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div><h2 className="text-2xl font-black text-gray-900">Prompt Library</h2><p className="text-sm text-gray-500 mt-1">{PROMPTS.length} playbook prompts — copy into any AI assistant</p></div>
        <div className="relative"><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search..." className="pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm w-48"/><Ic n="search" size={14} cls="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"/></div>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        {PCATS.map(c=><button key={c} onClick={()=>setCat(c)} className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${cat===c?'text-white':'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}`} style={cat===c?{background:'var(--pw)'}:{}}>{c}{c!=='All'&&` (${PROMPTS.filter(p=>p.cat===c).length})`}</button>)}
      </div>
      <div className="space-y-2">
        {filtered.map(p=>(
          <div key={p.id} className="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
            <div className="flex items-center justify-between p-4 cursor-pointer" onClick={()=>setOpen(open===p.id?null:p.id)}>
              <div className="flex items-center gap-3 min-w-0">
                <span className={`${PTAG[p.tag]||'bg-gray-100 text-gray-600'} text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider shrink-0`}>{p.tag}</span>
                <div className="min-w-0"><h3 className="text-sm font-bold text-gray-900">{p.title}</h3><p className="text-xs text-gray-500 truncate">{p.desc}</p></div>
              </div>
              <div className="flex items-center gap-2 ml-3 shrink-0">
                <button onClick={e=>{e.stopPropagation();copy(p.prompt,p.id);}} className={`px-3 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1 transition-all ${copiedId===p.id?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}><Ic n={copiedId===p.id?'check':'copy'} size={12}/>{copiedId===p.id?'Copied':'Copy'}</button>
                <Ic n={open===p.id?'chevron-up':'chevron-down'} size={15} cls="text-gray-400"/>
              </div>
            </div>
            {open===p.id&&<div className="border-t border-gray-100 px-4 pb-4 pt-3 fi"><pre className="bg-gray-50 border border-gray-100 rounded-lg p-3.5 text-xs text-gray-600 whitespace-pre-wrap leading-relaxed overflow-auto max-h-56">{p.prompt}</pre></div>}
          </div>
        ))}
        {!filtered.length&&<div className="text-center py-10 text-gray-400"><Ic n="search" size={28} cls="mx-auto mb-2 text-gray-200"/><p className="text-sm">No prompts match</p></div>}
      </div>
    </div>
  );
};

        <div className="mx-auto w-11 h-11 bg-orange-50 rounded-xl flex items-center justify-center text-orange-600 mb-2.5 group-hover:bg-orange-600 group-hover:text-white transition-colors"><Ic n="alert-triangle" size={20}/></div>

  </div>
);

);

        <div style={{padding:'20px 20px 14px',borderBottom:'1px solid #f3f4f6'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
            <div style={{width:28,height:28,background:'var(--pw)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><Ic n="zap" size={14}/></div>
            <span style={{fontWeight:800,fontSize:15,color:'var(--pw)',letterSpacing:'-0.02em'}}>Promowise TAL</span>
          </div>
          <p style={{fontSize:10,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:700,marginLeft:36}}>Campaign Ops Toolkit</p>

            <p style={{fontWeight:700,color:'#374151',marginBottom:4,display:'flex',alignItems:'center',gap:4}}><Ic n="lock" size={11}/>Fully client-side</p>
            No data leaves your browser. All processing and Excel export happen locally.
          </div>

        <header style={{background:'#fff',borderBottom:'1px solid #e5e7eb',padding:'10px 20px',display:'flex',alignItems:'center',gap:12,flexShrink:0,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>

        <div style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:24}}>
